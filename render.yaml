services:
  # ──────────────────────────────────────────────────────────
  # Backend — Node.js / Express / TypeScript
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docucenter-kiosk-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: ENABLE_CORS
        value: "true"
      - key: ENABLE_HELMET
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://docucenter-admin.onrender.com"
      # ── Turso (libSQL) — fill in the Render Dashboard ─────
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # ── Secrets — fill these in the Render Dashboard ──────
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
      - key: PAYMONGO_MERCHANT_ID
        sync: false

  # ──────────────────────────────────────────────────────────
  # Admin Console — Next.js
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docucenter-kiosk-admin
    runtime: node
    rootDir: admin
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to the backend's Render URL after first deploy:
      - key: NEXT_PUBLIC_API_URL
        value: "https://docucenter-kiosk-backend.onrender.com"
      # ── Auth — fill these in the Render Dashboard ─────────
      # ADMIN_USERNAME: the login username (e.g. admin)
      # ADMIN_PASSWORD: a strong password
      # SESSION_SECRET: random 32+ char string (openssl rand -base64 32)
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
