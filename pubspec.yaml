name: web_doc
description: A Flutter application with web documentation.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.4
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  file_selector: ^1.0.3
  qr_flutter: ^4.1.0
  network_info_plus: ^6.1.0
  flutter_blue_plus: ^1.6.0
  wifi_iot: ^0.3.19+2
  image: ^4.8.0
  pdf: ^3.12.0
  win_ble: ^1.1.1
  win32: ^5.0.0
  ffi: ^2.2.0
  flutter_twain_scanner: ^2.0.1
  paymongo_sdk: ^1.0.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  http: ^1.1.0

flutter:
  uses-material-design: true
  
  # Supported platforms: Android, Windows only
  # (iOS and macOS removed; Linux unsupported by current dependencies)

  assets:
    - assets/

