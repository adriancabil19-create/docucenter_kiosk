name: web_doc
description: A Flutter application with web documentation.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  file_selector: ^1.0.3
  qr_flutter: ^4.1.0
  network_info_plus: ^6.1.0
  flutter_blue_plus: ^1.6.0
  wifi_iot: ^0.3.19+2
  win_ble: ^1.1.1
  win32: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
